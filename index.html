<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tal Digital - Premium Showcase</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Assistant', 'sans-serif'],
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
                        'blob': 'blob 7s infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        blob: {
                            '0%, 100%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #f9fafb; /* רקע אפור בהיר מאוד לבסיס */
            overflow-x: hidden;
        }
        
        /* אפקט הזכוכית (Glassmorphism) */
        .glass-card {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
        
        /* אפקט זכוכית לכפתורים */
        .glass-btn {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }
        
        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        /* השהיית אנימציה לרכיבים */
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }
    </style>
</head>
<body class="text-gray-900 antialiased font-sans">

    <div class="fixed inset-0 -z-10">
        <div class="absolute top-0 -left-4 w-72 h-72 bg-blue-100 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-blob"></div>
        <div class="absolute top-0 -right-4 w-72 h-72 bg-purple-100 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-blob animation-delay-2000"></div>
        <div class="absolute -bottom-8 left-20 w-72 h-72 bg-pink-100 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-blob animation-delay-4000"></div>
    </div>

    <div class="min-h-screen flex flex-col items-center justify-center p-4 md:p-8">
        
        <div class="glass-card w-full max-w-md rounded-3xl p-8 md:p-10 animate-fade-in-up opacity-0">
            
            <header class="text-center mb-10">
                <div class="w-20 h-20 bg-white/80 rounded-full mx-auto mb-4 shadow-inner flex items-center justify-center border border-white/50">
                    <svg class="w-10 h-10 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 009 11a13.921 13.921 0 00-2.347-7.361m3.44 2.04L9 11m0 0l2.347 7.361M12 11c0 3.517 1.009 6.799 2.753 9.571m3.44-2.04l-.054.09A13.916 13.916 0 0015 11a13.921 13.921 0 002.347-7.361m-3.44 2.04L15 11m0 0l-2.347 7.361m3.44-2.04L15 11" />
                    </svg>
                </div>
                <h1 class="text-3xl font-bold tracking-tighter text-gray-950">סטודיו <span class="text-gray-800 font-extralight">שגב</span></h1>
                <p class="text-gray-600 mt-2 text-base">צילום אירועים ואדריכלות בסטייל מנצח</p>
            </header>

            <div class="space-y-4 mb-12">
                
                <a href="https://wa.me/" class="glass-btn flex items-center gap-4 w-full p-5 rounded-2xl shadow-sm animate-fade-in-up opacity-0 delay-1 hover:border-gray-300">
                    <div class="w-12 h-12 bg-gray-100/50 rounded-xl flex items-center justify-center text-2xl">📱</div>
                    <div>
                        <span class="font-semibold text-gray-900 block text-lg">תיאום שיחת ייעוץ</span>
                        <span class="text-sm text-gray-500 block -mt-1">זמין בוואטסאפ עכשיו</span>
                    </div>
                    <svg class="w-5 h-5 text-gray-400 mr-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </a>

                <a href="#" class="glass-btn flex items-center gap-4 w-full p-5 rounded-2xl shadow-sm animate-fade-in-up opacity-0 delay-2 hover:border-gray-300">
                    <div class="w-12 h-12 bg-gray-100/50 rounded-xl flex items-center justify-center text-2xl">📸</div>
                    <div>
                        <span class="font-semibold text-gray-900 block text-lg">תיק עבודות אינסטגרם</span>
                        <span class="text-sm text-gray-500 block -mt-1">לראות את הקסם בעין</span>
                    </div>
                    <svg class="w-5 h-5 text-gray-400 mr-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </a>

                <a href="#" class="glass-btn flex items-center gap-4 w-full p-5 rounded-2xl shadow-sm animate-fade-in-up opacity-0 delay-3 hover:border-gray-300">
                    <div class="w-12 h-12 bg-gray-100/50 rounded-xl flex items-center justify-center text-2xl">🌐</div>
                    <div>
                        <span class="font-semibold text-gray-900 block text-lg">גלריית אתר מלאה</span>
                        <span class="text-sm text-gray-500 block -mt-1">פרויקטים נבחרים מ-2026</span>
                    </div>
                    <svg class="w-5 h-5 text-gray-400 mr-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </a>
                
            </div>

<div class="animate-fade-in-up opacity-0 delay-3 mt-10">
    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-5 px-1">הצצה לעבודות</h3>
    <div class="grid grid-cols-3 gap-3">
        
        <div class="aspect-square rounded-xl border border-white/80 shadow-md overflow-hidden transform hover:scale-105 transition-transform duration-300">
            <img src="a1.jpg" onclick="openImg(this.src)" alt="a1" class="w-full h-full object-cover">
        </div>

        <div class="aspect-square rounded-xl border border-white/80 shadow-md overflow-hidden transform hover:scale-105 transition-transform duration-300 delay-100">
            <img src="a2.jpg" onclick="openImg(this.src)" alt="a2" class="w-full h-full object-cover">
        </div>

        <div class="aspect-square rounded-xl border border-white/80 shadow-md overflow-hidden transform hover:scale-105 transition-transform duration-300 delay-200">
            <img src="a3.jpg" onclick="openImg(this.src)" alt="a3" class="w-full h-full object-cover">
        </div>

    </div>
</div>
            </div>

            <footer class="mt-16 pt-6 border-t border-white/30 text-center animate-fade-in-up opacity-0 delay-3">
                <p class="text-[10px] text-gray-400 tracking-widest uppercase font-light">כל הזכויות שמורות ל- <span class="font-bold text-gray-500">טל גזית</span></p>
            </footer>

        </div> </div> </body>
</html>
