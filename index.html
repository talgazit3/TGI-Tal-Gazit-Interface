<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tal Digital - אתרים נקיים ומודרניים</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Assistant', 'sans-serif'] },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
                        'blob': 'blob 7s infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        blob: {
                            '0%, 100%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #f9fafb; overflow-x: hidden; }
        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 40px 0 rgba(31, 38, 135, 0.08);
        }
        .glass-btn {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.95);
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
        }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }
    </style>
</head>
<body class="text-gray-900 antialiased font-sans">

    <div class="fixed inset-0 -z-10">
        <div class="absolute top-0 -left-4 w-72 h-72 bg-blue-100 rounded-full mix-blend-multiply filter blur-2xl opacity-70 animate-blob"></div>
        <div class="absolute top-0 -right-4 w-72 h-72 bg-purple-100 rounded-full mix-blend-multiply filter blur-2xl opacity-70 animate-blob animation-delay-2000"></div>
        <div class="absolute -bottom-10 left-20 w-80 h-80 bg-pink-100 rounded-full mix-blend-multiply filter blur-2xl opacity-70 animate-blob animation-delay-4000"></div>
    </div>

    <div class="min-h-screen flex flex-col items-center justify-center p-4">
        
        <div class="glass-card w-full max-w-md rounded-3xl p-8 md:p-10 animate-fade-in-up opacity-0 shadow-lg">
            
            <header class="text-center mb-10">
                <div class="w-20 h-20 bg-white/90 rounded-full mx-auto mb-5 shadow-inner flex items-center justify-center border border-white/60">
                    <svg class="w-10 h-10 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg>
                </div>
                <h1 class="text-4xl font-extrabold tracking-tighter text-gray-950">Tal <span class="font-light text-gray-700">Digital</span></h1>
                <p class="text-lg text-gray-600 mt-2 font-light">בניית אתרים נקיים ומודרניים</p>
                <div class="inline-block mt-4 px-3 py-1 bg-white/50 rounded-full border border-white/70 text-xs font-medium text-gray-500 tracking-wider uppercase">סוכנות דיגיטלית מקומית</div>
            </header>

            <div class="space-y-4 mb-12">
                <a href="https://wa.me/972500000000?text=היי טל, ראיתי את האתר שלך ואשמח לשמוע פרטים על בניית אתר." class="glass-btn flex items-center gap-5 w-full p-5 rounded-2xl shadow-sm animate-fade-in-up opacity-0 delay-1">
                    <div class="w-14 h-14 bg-gray-100/50 rounded-2xl flex items-center justify-center text-3xl shadow-inner border border-white/60">💬</div>
                    <div>
                        <span class="font-bold block text-xl text-gray-950">סגירת אתר בוואטסאפ</span>
                        <span class="text-sm text-gray-500 block -mt-1">דברו איתי עכשיו בקליק</span>
                    </div>
                    <svg class="w-5 h-5 text-gray-400 mr-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
                </a>

                <a href="https://wa.me/972500000000?text=אשמח לקבל הצעת מחיר" class="glass-btn flex items-center gap-5 w-full p-5 rounded-2xl shadow-sm animate-fade-in-up opacity-0 delay-2">
                    <div class="w-14 h-14 bg-gray-100/50 rounded-2xl flex items-center justify-center text-3xl shadow-inner border border-white/60">✨</div>
                    <div>
                        <span class="font-bold block text-xl text-gray-950">הצעת מחיר מהירה</span>
                        <span class="text-sm text-gray-500 block -mt-1">בלי הפתעות, רק תוצאות</span>
                    </div>
                    <svg class="w-5 h-5 text-gray-400 mr-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
                </a>
            </div>

            <div class="animate-fade-in-up opacity-0 delay-3 mt-10">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-5 px-1">דוגמאות לעבודות בסטייל</h3>
                <div class="grid grid-cols-3 gap-3">
                    <div class="aspect-square rounded-xl border border-white/90 shadow-lg overflow-hidden cursor-pointer transform hover:scale-105 hover:shadow-xl transition-all duration-300" onclick="openModal(this.querySelector('img').src)">
                        <img src="a1.jpg" alt="Project 1" class="w-full h-full object-cover">
                    </div>
                    <div class="aspect-square rounded-xl border border-white/90 shadow-lg overflow-hidden cursor-pointer transform hover:scale-105 hover:shadow-xl transition-all duration-300 delay-100" onclick="openModal(this.querySelector('img').src)">
                        <img src="a2.jpg" alt="Project 2" class="w-full h-full object-cover">
                    </div>
                    <div class="aspect-square rounded-xl border border-white/90 shadow-lg overflow-hidden cursor-pointer transform hover:scale-105 hover:shadow-xl transition-all duration-300 delay-200" onclick="openModal(this.querySelector('img').src)">
                        <img src="a3.jpg" alt="Project 3" class="w-full h-full object-cover">
                    </div>
                </div>
                <p class="text-[10px] text-center text-gray-400 mt-4 px-2">במחיר מיוחד לשכנים ב-300 ש"ח!</p>
            </div>

            <footer class="mt-16 pt-6 border-t border-white/30 text-center animate-fade-in-up opacity-0 delay-3">
                <p class="text-[10px] text-gray-400 tracking-widest uppercase font-extralight">נוצר על ידי <span class="font-bold text-gray-500">Tal Digital</span> @ 2026</p>
            </footer>

        </div> </div> <div id="imageModal" class="fixed inset-0 z-50 hidden bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 cursor-pointer transition-opacity duration-300" onclick="closeModal()">
        <span class="absolute top-5 right-5 text-white text-4xl">&times;</span>
        <img id="modalImage" class="max-w-full max-h-full rounded-lg shadow-2xl transition-transform duration-300 scale-95 object-contain">
    </div>

    <script>
        function openModal(src) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            modal.classList.remove('hidden');
            modal.style.opacity = '1';
            modalImg.src = src;
            setTimeout(() => {
                modalImg.classList.remove('scale-95');
                modalImg.classList.add('scale-100');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            modalImg.classList.remove('scale-100');
            modalImg.classList.add('scale-95');
            modal.style.opacity = '0';
            setTimeout(() => { 
                modal.classList.add('hidden'); 
            }, 200);
        }
    </script>
</body>
</html>
